<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="theme-color" content="#145D49" />
    <meta
      name="description"
      content="GPX Slicer — split long-distance GPX routes into multi-day segments with an interactive map and elevation profile."
    />
    <title>GPX Slicer</title>
  </head>
  <body>
    <script>
      // Pre-apply the persisted theme (default: follow system) before React
      // mounts, so dark-mode users don't get a light flash on load. Kept in
      // sync with helpers/themeMode.tsx.
      try {
        var themeMode = localStorage.getItem("themeMode");
        if (
          themeMode === "dark" ||
          (themeMode !== "light" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.body.classList.add("dark");
        }
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
